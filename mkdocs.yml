site_name: CoBalance Documentation
site_url: https://cobalance.bordewick.dev

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

copyright: Copyright &copy; 2026 Jonas Bordewick

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonasBordewick/CoBalance
      name: CoBalance on GitHub

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Home: Home
            Erste Schritte: Getting Started
            Unity Plugin: Unity Plugin
            Überblick: Overview
            Entitäten: Entities
            Parameter: Parameters
            Logging: Logging
            Simulation: Simulation
            Auto-Suggestion: Auto Suggestion
            Desktop App: Desktop App
            Vergleich: Comparison
            Auto Suggestion: Auto Suggestion
            Einstellungen: Settings
            Beispiele: Examples
            Scriptable Objects: Scriptable Objects
            Simple Game Object: Simple Game Object
            Advanced Parameter Example: Advanced Parameter Example

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables

nav:
  - Home: index.md
  - Erste Schritte: getting-started.md
  - Unity Plugin:
      - Überblick: unity-plugin/overview.md
      - Entitäten: unity-plugin/entities.md
      - Parameter: unity-plugin/parameters.md
      - Logging: unity-plugin/logging.md
      - Simulation: unity-plugin/simulation.md
      - Auto-Suggestion: unity-plugin/auto-suggestion.md
  - Desktop App:
      - Überblick: desktop-app/overview.md
      - Projekt: desktop-app/project.md
      - Parameter: desktop-app/parameter-view.md
      - Logs: desktop-app/logs-view.md
      - Vergleich: desktop-app/comparison-view.md
      - Simulation: desktop-app/simulation.md
      - Auto Suggestion: desktop-app/auto-suggestion.md
      - Einstellungen: desktop-app/settings.md
  - Beispiele:
      - Scriptable Objects: examples/scripable_object_example.md
      - Simple Game Object: examples/simple_game_object_example.md
      - Advanced Parameter Example: examples/advanced_parameter_example.md